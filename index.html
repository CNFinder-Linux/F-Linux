    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0e14;
            color: #e4e9f2;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            flex: 1;
            width: 100%;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .header h1 .tux-icon {
            -webkit-text-fill-color: initial;
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .header p {
            color: #8892a8;
            margin-top: 0.3rem;
            font-size: 1.05rem;
        }

        /* ===== 统计 ===== */
        .stats {
            text-align: center;
            font-size: 0.95rem;
            color: #8892a8;
            margin-bottom: 1.8rem;
        }
        .stats span {
            color: #ffd700;
            font-weight: 600;
        }

        /* ===== 筛选栏 ===== */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1.2rem;
            justify-content: center;
            background: #161c26;
            padding: 1.2rem 2rem;
            border-radius: 16px;
            margin-bottom: 2.5rem;
            border: 1px solid #262e3a;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #8892a8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #2d3748;
            color: #b0baca;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .filter-btn:hover {
            border-color: #f7971e;
            color: #fff;
        }

        .filter-btn.active {
            background: #f7971e;
            border-color: #f7971e;
            color: #0b0e14;
            font-weight: 600;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #4a5568;
            color: #8892a8;
            padding: 0.25rem 1.2rem;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 0.3rem;
        }

        .reset-btn:hover {
            background: #4a5568;
            color: #fff;
        }

        /* ===== 卡片网格 ===== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: #141b24;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 1.5rem 1.2rem 1.2rem;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #f7971e;
            box-shadow: 0 12px 30px rgba(247, 151, 30, 0.08);
        }

        .card .logo {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            object-fit: contain;
            background: #1f2937;
            padding: 6px;
            margin-bottom: 0.5rem;
        }

        .card .name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.1rem;
        }

        .card .desc {
            font-size: 0.85rem;
            color: #8892a8;
            margin-bottom: 0.6rem;
            flex: 1;
            min-height: 40px;
        }

        .card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin: 0.3rem 0 0.8rem;
        }

        .card .tags span {
            background: #1f2937;
            padding: 0.1rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #b0baca;
            letter-spacing: 0.3px;
        }

        .card .tags span.family-debian {
            background: #1e3a5f;
            color: #6ab0ff;
        }
        .card .tags span.family-redhat {
            background: #3d1e1e;
            color: #ff7b7b;
        }
        .card .tags span.family-arch {
            background: #1e3d3d;
            color: #5dd9d9;
        }
        .card .tags span.family-other {
            background: #2d2d3d;
            color: #b8b8e0;
        }
        .card .tags span.hot-tag {
            background: #3d2a1a;
            color: #ffb347;
        }

        .card .year-badge {
            position: absolute;
            top: 0.8rem;
            right: 1rem;
            font-size: 0.7rem;
            color: #4a5568;
            background: #1f2937;
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            font-weight: 500;
        }

        /* ===== 按钮组：官方 + 国内镜像 ===== */
        .card .btn-group {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.3rem;
            flex-wrap: wrap;
        }

        .card .btn-group a {
            flex: 1;
            min-width: 80px;
            text-align: center;
            padding: 0.45rem 0;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-official {
            background: #f7971e;
            color: #0b0e14;
        }
        .btn-official:hover {
            background: #ffa82e;
            transform: scale(1.02);
        }

        .btn-mirror {
            background: transparent;
            color: #6aaf5c;
            border: 1px solid #2d5a2d;
        }
        .btn-mirror:hover {
            background: #1a3a1a;
            border-color: #6aaf5c;
        }

        .btn-mirror.no-mirror {
            color: #4a5568;
            border-color: #2d3748;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .btn-mirror.no-mirror:hover {
            background: transparent;
            transform: none;
        }

        /* ===== 空状态 ===== */
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 0;
            color: #4a5568;
        }
        .empty i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        /* ===== 页脚 ===== */
        .footer {
            margin-top: 3rem;
            padding: 1.5rem 0;
            text-align: center;
            border-top: 1px solid #1f2937;
            color: #4a5568;
            font-size: 0.9rem;
        }
        .footer a {
            color: #f7971e;
            text-decoration: none;
            font-weight: 600;
        }
        .footer a:hover {
            text-decoration: underline;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            .header h1 {
                font-size: 2rem;
            }
            .header h1 .tux-icon {
                width: 36px;
                height: 36px;
            }
            .filters {
                padding: 1rem;
                gap: 0.6rem;
            }
            .filter-group {
                width: 100%;
                justify-content: center;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>
        // ============================================================
        //  数据：Linux 发行版（15 个，保持不变）
        // ============================================================
        var distros = [{
            id: 1,

        }, {

            family: 'arch',

        }, {

            mirrorUrl: 'https://mirrors.ustc.edu.cn/manjaro/'
        }, {
            id: 7,
            name: 'CentOS Stream',
            domain: 'centos.org',
            desc: 'RHEL 的下游滚动开发版，社区驱动',
            family: 'redhat',
            year: 2025,
            hot: false,
            officialUrl: 'https://www.centos.org/download/',
            mirrorUrl: 'https://mirrors.ustc.edu.cn/centos-stream/'
        }, {
            id: 8,
            name: 'openSUSE',

            year: 2025,
            hot: false,
            officialUrl: 'https://get.opensuse.org/',
            mirrorUrl: 'https://mirrors.ustc.edu.cn/opensuse/'
        }, {
            id: 9,

            domain: 'gentoo.org',
            desc: '源码编译，高度可定制，极致性能',
            family: 'other',
            year: 2024,
            hot: false,
            officialUrl: 'https://www.gentoo.org/downloads/',
            mirrorUrl: 'https://mirrors.ustc.edu.cn/gentoo/'
        }, {
            id: 10,
            name: 'AlmaLinux',
            domain: 'almalinux.org',
            desc: 'RHEL 克隆，CentOS 替代首选',
            family: 'redhat',
            year: 2025,
            hot: false,
            officialUrl: 'https://almalinux.org/download/',
            mirrorUrl: 'https://mirrors.ustc.edu.cn/almalinux/'
        }, {
            id: 11,
            name: 'Rocky Linux',
            domain: 'rockylinux.org',
            desc: 'RHEL 克隆，社区驱动，企业级',
            family: 'redhat',
            year: 2025,
            hot: false,
            officialUrl: 'https://rockylinux.org/download/',
            mirrorUrl: 'https://mirrors.ustc.edu.cn/rockylinux/'
        }, {
            id: 12,
            name: 'Linux Mint',
            domain: 'linuxmint.com',
            desc: '基于 Ubuntu，Cinnamon 桌面，优雅易用',
            family: 'debian',
            year: 2026,
            hot: true,
            officialUrl: 'https://linuxmint.com/download.php',
            mirrorUrl: 'https://mirrors.ustc.edu.cn/linuxmint/'
        }, {
            id: 13,
            name: 'Kali Linux',
            domain: 'kali.org',
            desc: '渗透测试专用，基于 Debian',
            family: 'debian',
            year: 2025,
            hot: false,
            officialUrl: 'https://www.kali.org/get-kali/',
            mirrorUrl: 'https://mirrors.ustc.edu.cn/kali-images/'
        }, {
            id: 14,
            name: 'EndeavourOS',
            domain: 'endeavouros.com',
            desc: 'Arch 系，轻量且美观，滚动更新',
            family: 'arch',
            year: 2025,
            hot: false,
            officialUrl: 'https://endeavouros.com/download/',
            mirrorUrl: 'https://mirrors.ustc.edu.cn/endeavouros/'
        }, {
            id: 15,
            name: 'NixOS',
            domain: 'nixos.org',
            desc: '声明式配置，不可变系统，极客最爱',
            family: 'other',
            year: 2025,
            hot: false,
            officialUrl: 'https://nixos.org/download/',
            mirrorUrl: 'https://mirrors.ustc.edu.cn/nixos/'
        }];

        // ============================================================
        //  渲染逻辑（完全保留第一版，未改动）
        // ============================================================
        var grid = document.getElementById('cardGrid');
        var totalSpan = document.getElementById('totalCount');

        var filters = {
            family: 'all',
            hot: 'all',
            year: 'all'
        };

        var filterBtns = document.querySelectorAll('.filter-btn');

        filterBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                var type = this.dataset.type;
                var value = this.dataset.value;
                var group = this.closest('.filter-group');
                if (group) {
                    var btns = group.querySelectorAll('.filter-btn');
                    for (var i = 0; i < btns.length; i++) {
                        btns[i].classList.remove('active');
                    }
                }
                this.classList.add('active');
                filters[type] = value;
                render();
            });
        });

        document.getElementById('resetFilters').addEventListener('click', function() {
            var allBtns = document.querySelectorAll('.filter-btn');
            for (var i = 0; i < allBtns.length; i++) {
                if (allBtns[i].dataset.value === 'all') {
                    allBtns[i].classList.add('active');
                } else {
                    allBtns[i].classList.remove('active');
                }
            }
            filters.family = 'all';
            filters.hot = 'all';
            filters.year = 'all';
            render();
        });

        function render() {
            var filtered = [];
            for (var i = 0; i < distros.length; i++) {
                var d = distros[i];
                if (filters.family !== 'all' && d.family !== filters.family) continue;
                if (filters.hot !== 'all' && !d.hot) continue;
                if (filters.year !== 'all') {
                    if (filters.year === 'older') {
                        if (d.year >= 2024) continue;
                    } else {
                        if (d.year !== parseInt(filters.year)) continue;
                    }
                }
                filtered.push(d);
            }

            totalSpan.textContent = filtered.length;

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty"><i class="fas fa-search"></i><p>没有匹配的发行版，试试调整筛选条件</p></div>';
                return;
            }

            var html = '';
            for (var j = 0; j < filtered.length; j++) {
                var d = filtered[j];
                var yearLabel = d.year < 2024 ? '更早' : d.year;

                var familyMap = {
                    debian: 'Debian系',
                    redhat: 'RedHat系',
                    arch: 'Arch系',
                    other: '其他'
                };
                var familyLabel = familyMap[d.family] || d.family;

                var mirrorBtn = '';
                if (d.mirrorUrl) {
                    mirrorBtn = '<a href="' + d.mirrorUrl + '" target="_blank" class="btn-mirror"><i class="fas fa-server"></i> 国内镜像</a>';
                } else {
                    mirrorBtn = '<span class="btn-mirror no-mirror"><i class="fas fa-server"></i> 无镜像</span>';
                }

                var hotTag = d.hot ? '<span class="hot-tag">🔥 热门</span>' : '';

                html +=
                    '<div class="card">' +
                    '<span class="year-badge">' + yearLabel + '</span>' +
                    '<img class="logo" src="https://www.google.com/s2/favicons?domain=' + d.domain + '" alt="' + d.name +
                    '" onerror="this.style.display=\'none\'" />' +
                    '<div class="name">' + d.name + '</div>' +
                    '<div class="desc">' + d.desc + '</div>' +
                    '<div class="tags">' +
                    '<span class="family-' + d.family + '">' + familyLabel + '</span>' +
                    hotTag +
                    '</div>' +
                    '<div class="btn-group">' +
                    '<a href="' + d.officialUrl + '" target="_blank" class="btn-official"><i class="fas fa-download"></i> 官方下载</a>' +
                    mirrorBtn +
                    '</div>' +
                    '</div>';
            }

            grid.innerHTML = html;
        }

        render();
    </script>
